theme: jekyll-theme-minimal
timezone: Etc/GMT+12
defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: "default"
title: "Pavel Zhelnov"
url: "https://pavel.zheln.com/"
description: "Hi, I’m Pavel, a surgeon-turned-research engineer. I help people who need reproducible scientific data and AI but lack the technical expertise. I’ve worked for 10 years in medicine and health administration and shipped software since 2012."
lang: "en-US"
show_downloads: true
google_analytics: UA-122303329-2
markdown: kramdown
plugins:
  - jekyll-readme-index
  - jekyll-seo-tag
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
readme_index:
  enabled:          true
  remove_originals: false
  with_frontmatter: false
optional_front_matter:
  remove_originals: false
titles_from_headings:
  enabled:     true
  strip_title: false
  collections: false
